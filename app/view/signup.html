<h1>Signup 🫥</h1>

{% for error in errors %}
    <p style="color: red">{{ error }}</p>
{% endfor %}
{% for msg in messages %}
    <p style="color: green">{{ msg }}</p>
{% endfor %}

<form action="/auth/signup" method="post">
    <p>
        <p><label for="email_field">Email</label></p>
          <input type="email" id="email_field" name="username" value="{{ username }}" required>
    </p>
    <p>
        <label for="pass_field">Password</label>
        <input type="password" id="pass_field" name="password" value="{{ password }}" required>
     </p>
    <input type="submit" value="Submit">
</form>

<hr>
